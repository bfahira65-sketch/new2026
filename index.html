<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRAK GAME</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080b14;
color:white;
min-height:100vh;
}


/* HEADER */

header{

height:80px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 8%;

}

.logo{

font-size:28px;
font-weight:bold;
color:#ffd700;

}


nav a{

color:white;
text-decoration:none;
margin-left:15px;

}


.btn{

padding:10px 20px;
border-radius:10px;
cursor:pointer;

}

.login{

background:#2563eb;

}

.register{

background:#ffd700;
color:black;

}


/* HERO */

.hero{

height:500px;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(#0008,#0008),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;

}


.hero h1{

font-size:55px;

}


.hero button{

margin-top:30px;

padding:15px 40px;

border:none;

background:#ffd700;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}



/* GAME CARD */

.container{

padding:50px 8%;

}


.card{

background:#151b2b;

padding:25px;

border-radius:20px;

margin-top:20px;

}


/* POPUP */

.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000b;

justify-content:center;
align-items:center;

}


.form{

background:#111827;

padding:30px;

width:350px;

border-radius:20px;

}


.form h2{

text-align:center;

margin-bottom:20px;

}


input{

width:100%;

padding:12px;

margin-bottom:15px;

border:none;

border-radius:8px;

background:#1f2937;

color:white;

}


.form button{

width:100%;

padding:12px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}


/* DASHBOARD */


.dashboard{

display:none;

padding:50px 8%;

}


.profile{

background:#151b2b;

padding:30px;

border-radius:20px;

}


.stats{

display:flex;

gap:15px;

margin-top:20px;

}


.stat{

background:#1e293b;

padding:15px 25px;

border-radius:10px;

text-align:center;

}



/* GAME */

.game{

display:none;

text-align:center;

padding:50px;

}


.click{

width:200px;

height:200px;

border-radius:50%;

background:#2563eb;

color:white;

font-size:25px;

border:none;

cursor:pointer;

}



</style>

</head>


<body>


<header>

<div class="logo">
🎮 DRAK GAME
</div>


<nav id="menu">

<a onclick="showLogin()" class="btn login">
Login
</a>

<a onclick="showRegister()" class="btn register">
Daftar
</a>

</nav>


</header>



<section class="hero" id="home">

<div>

<h1>
SELAMAT DATANG
</h1>

<p>
Platform Game Buatan Sendiri
</p>


<button onclick="openGame()">
Mulai Bermain
</button>


</div>

</section>



<div class="container">

<h2>
Game Saya
</h2>


<div class="card">

🎯 Click Challenge

<br><br>

Game klik untuk mendapatkan EXP dan Coin.


</div>

</div>





<!-- LOGIN -->


<div class="popup" id="loginBox">

<div class="form">

<h2>
LOGIN
</h2>


<input id="loginUser" placeholder="Username">


<input id="loginPass" type="password" placeholder="Password">


<button onclick="login()">
Masuk
</button>


</div>

</div>





<!-- REGISTER -->


<div class="popup" id="registerBox">

<div class="form">


<h2>
DAFTAR
</h2>


<input id="regUser" placeholder="Username">


<input id="regPass" type="password" placeholder="Password">


<button onclick="register()">
Buat Akun
</button>


</div>

</div>







<!-- DASHBOARD -->


<section class="dashboard" id="dashboard">


<div class="profile">


<h2>
👤 <span id="username"></span>
</h2>


<div class="stats">


<div class="stat">

Level

<br>

<b id="level">
1
</b>

</div>


<div class="stat">

EXP

<br>

<b id="exp">
0
</b>

</div>



<div class="stat">

Coin

<br>

<b id="coin">
500
</b>

</div>


</div>


<br>

<button onclick="openGame()">
Main Game
</button>


<button onclick="logout()">
Logout
</button>


</div>


</section>





<!-- GAME -->


<section class="game" id="game">


<h1>
🎯 CLICK CHALLENGE
</h1>


<h2>
Waktu : <span id="time">10</span>
</h2>


<h2>
Score : <span id="score">0</span>
</h2>



<button class="click" onclick="clickGame()">

CLICK

</button>


</section>





<script>


function showLogin(){

loginBox.style.display="flex";

}


function showRegister(){

registerBox.style.display="flex";

}




function register(){

let user=regUser.value;

let pass=regPass.value;


localStorage.setItem(

"akun",

JSON.stringify({

username:user,
password:pass

})

);


alert("Akun berhasil dibuat");

registerBox.style.display="none";

}





function login(){


let data=
JSON.parse(localStorage.getItem("akun"));


if(
data &&
data.username==loginUser.value &&
data.password==loginPass.value
){


localStorage.setItem(
"login",
data.username
);


location.reload();


}

else{

alert("Login gagal");

}


}





window.onload=function(){


let user=
localStorage.getItem("login");


if(user){


home.style.display="none";

document.querySelector(".container").style.display="none";


dashboard.style.display="block";


username.innerHTML=user;


level.innerHTML=
localStorage.getItem("level")||1;


exp.innerHTML=
localStorage.getItem("exp")||0;


coin.innerHTML=
localStorage.getItem("coin")||500;


}


}





function openGame(){


dashboard.style.display="none";

document.querySelector(".container").style.display="none";

home.style.display="none";


game.style.display="block";


}



let score=0;

let time=10;

let aktif=true;



function clickGame(){


if(!aktif)return;


score++;

document.getElementById("score").innerHTML=score;


}




let timer=setInterval(()=>{


if(game.style.display=="block"){


time--;

document.getElementById("time").innerHTML=time;



if(time<=0){


aktif=false;


saveScore(score);


alert(
"Score kamu "+score
);


}



}


},1000);






function saveScore(score){


let exp=
Number(localStorage.getItem("exp"))||0;


let coin=
Number(localStorage.getItem("coin"))||500;


let level=
Number(localStorage.getItem("level"))||1;



exp+=score;

coin+=score*2;



if(exp>=100){

level++;

exp-=100;

alert(
"Level naik!"
);

}



localStorage.setItem("exp",exp);

localStorage.setItem("coin",coin);

localStorage.setItem("level",level);


}





function logout(){

localStorage.removeItem("login");

location.reload();

}


</script>


</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRAK GAME Dashboard</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#080b14;
color:white;

}


/* HEADER */

header{

height:75px;

background:#111827;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 8%;

}


.logo{

font-size:25px;

font-weight:bold;

color:#ffd700;

}


.logout{

background:#ef4444;

padding:10px 20px;

border-radius:10px;

color:white;

text-decoration:none;

}



/* PROFILE */


.profile{

margin:40px auto;

width:85%;

background:#151b2b;

padding:30px;

border-radius:20px;

display:flex;

align-items:center;

gap:30px;

}


.avatar{

width:100px;

height:100px;

background:#2563eb;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:50px;

}


.info h2{

font-size:30px;

}


.status{

margin-top:10px;

color:#aaa;

}



/* STAT */


.stats{

display:flex;

gap:20px;

margin-top:20px;

}


.stat{

background:#1e293b;

padding:15px 30px;

border-radius:12px;

text-align:center;

}



/* GAME */


.container{

width:85%;

margin:auto;

}


.container h2{

margin-bottom:25px;

}


.games{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:25px;

}


.card{

background:#151b2b;

border-radius:20px;

overflow:hidden;

}


.card img{

width:100%;

height:150px;

object-fit:cover;

}


.card h3{

padding:15px;

}



.play{

margin:0 15px 20px;

width:calc(100% - 30px);

padding:12px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}



</style>

</head>


<body>


<header>


<div class="logo">

🎮 DRAK GAME

</div>


<a class="logout" onclick="logout()">

Logout

</a>


</header>




<section class="profile">


<div class="avatar">

👤

</div>


<div class="info">


<h2 id="username">

Player

</h2>


<div class="status">

Pemain Baru

</div>


<div class="stats">


<div class="stat">

Level

<br>

<b>1</b>

</div>


<div class="stat">

EXP

<br>

<b>0 / 100</b>

</div>


<div class="stat">

Coin

<br>

<b>500</b>

</div>


</div>


</div>


</section>




<div class="container">


<h2>

🎮 Game Saya

</h2>



<div class="games">



<div class="card">

<img src="https://picsum.photos/500/300?1">

<h3>
Adventure World
</h3>

<button class="play">
Mainkan
</button>

</div>



<div class="card">

<img src="https://picsum.photos/500/300?2">

<h3>
Zombie Survival
</h3>

<button class="play">
Mainkan
</button>

</div>




<div class="card">

<img src="https://picsum.photos/500/300?3">

<h3>
Space Battle
</h3>

<button class="play">
Mainkan
</button>

</div>




<div class="card">

<img src="https://picsum.photos/500/300?4">

<h3>
Racing Max
</h3>

<button class="play">
Mainkan
</button>

</div>



</div>


</div>



<script>


let user =
localStorage.getItem("login");


if(!user){

location.href="index.html";

}


document.getElementById("username")
.innerHTML=user;



function logout(){

localStorage.removeItem("login");

location.href="index.html";

}


</script>


</body>

</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Portal - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:400px;
background:#171f2f;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.4);

}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:180px;
}

.logo h2{
color:#37c7ff;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:6px;
color:white;
}

.input-group input{

width:100%;
padding:13px;
border:none;
outline:none;
border-radius:10px;
background:#283447;
color:white;

}

button{

width:100%;
padding:14px;
background:#37c7ff;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#16b2ef;

}

.footer{

margin-top:20px;
text-align:center;
color:#bbb;

}

.footer a{

color:#37c7ff;
text-decoration:none;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="assets/logo.png" alt="Logo">

<!-- Jika belum punya logo -->
<!-- <h2>GAME PORTAL</h2> -->

</div>

<form action="dashboard.html">

<div class="input-group">

<label>Username</label>

<input type="text" placeholder="Masukkan Username" required>

</div>

<div class="input-group">

<label>Password</label>

<input type="password" placeholder="Masukkan Password" required>

</div>

<button type="submit">

LOGIN

</button>

</form>

<div class="footer">

Belum punya akun?

<a href="register.html">

Daftar Disini

</a>

</div>

</div>

</body>
</html>

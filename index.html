<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRAK GAME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
overflow:hidden;

}

body::before{

content:"";
position:absolute;
width:600px;
height:600px;
background:#2563eb;
border-radius:50%;
filter:blur(180px);
opacity:.35;
left:-150px;
top:-150px;

}

body::after{

content:"";
position:absolute;
width:500px;
height:500px;
background:#7c3aed;
border-radius:50%;
filter:blur(180px);
opacity:.35;
right:-150px;
bottom:-150px;

}

.card{

width:380px;
padding:35px;
border-radius:20px;
backdrop-filter:blur(18px);
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 50px rgba(0,0,0,.5);
z-index:10;

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo h1{

color:white;
font-size:32px;

}

.logo p{

color:#cbd5e1;
font-size:14px;

}

.logo-icon{

font-size:60px;

}

input{

width:100%;
padding:14px;
margin-top:15px;
border:none;
outline:none;
border-radius:12px;
background:#1e293b;
color:white;
font-size:15px;

}

button{

width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:#2563eb;
color:white;
transition:.3s;

}

button:hover{

background:#3b82f6;
transform:translateY(-2px);

}

.switch{

margin-top:20px;
text-align:center;
color:white;

}

.switch span{

color:#60a5fa;
cursor:pointer;

}

#register{

display:none;

}

.success{

margin-top:15px;
text-align:center;
color:#22c55e;

}

.error{

margin-top:15px;
text-align:center;
color:#ef4444;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<div class="logo-icon">🎮</div>

<h1>DRAK GAME</h1>

<p>Platform Game Buatan Sendiri</p>

</div>

<!-- LOGIN -->

<div id="login">

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="switch">

Belum punya akun?
<span onclick="showRegister()">Daftar</span>

</div>

<div id="loginInfo"></div>

</div>

<!-- REGISTER -->

<div id="register">

<input type="text" id="regUser" placeholder="Username">

<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">DAFTAR</button>

<div class="switch">

Sudah punya akun?
<span onclick="showLogin()">Login</span>

</div>

<div id="registerInfo"></div>

</div>

</div>

<script>

function showRegister(){

login.style.display="none";
register.style.display="block";

}

function showLogin(){

login.style.display="block";
register.style.display="none";

}

function register(){

let user=document.getElementById("regUser").value;

let pass=document.getElementById("regPass").value;

if(user==""||pass==""){

registerInfo.innerHTML="<div class='error'>Lengkapi data.</div>";
return;

}

localStorage.setItem(user,pass);

registerInfo.innerHTML="<div class='success'>Akun berhasil dibuat.</div>";

}

function login(){

let user=document.getElementById("loginUser").value;

let pass=document.getElementById("loginPass").value;

let data=localStorage.getItem(user);

if(data==pass){

alert("Selamat datang "+user);

}else{

loginInfo.innerHTML="<div class='error'>Username atau Password salah.</div>";

}

}

</script>

</body>
</html>

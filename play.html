<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Demo</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#111;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.card{

background:#1b1b1b;

border-radius:15px;

overflow:hidden;

box-shadow:0 0 20px rgba(255,215,0,.25);

}

.banner{

width:100%;
height:260px;

background:linear-gradient(45deg,#444,#222);

display:flex;

justify-content:center;

align-items:center;

font-size:70px;

color:gold;

}

.content{

padding:30px;

}

.content h1{

color:gold;

margin-bottom:20px;

}

.content p{

line-height:1.8;

color:#ddd;

margin-bottom:25px;

}

button{

padding:15px 35px;

background:gold;

border:none;

border-radius:8px;

font-size:18px;

font-weight:bold;

cursor:pointer;

margin-right:10px;

}

.back{

background:#555;

color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="banner">
🎮
</div>

<div class="content">

<h1 id="judul"></h1>

<p>
Ini adalah halaman demo untuk menampilkan detail fitur yang dipilih.
Anda dapat menggunakan halaman ini untuk menjelaskan fungsi, menampilkan
gambar, video, atau informasi lain sesuai kebutuhan proyek Anda.
</p>

<button onclick="mulaiDemo()">
Mulai Demo
</button>

<button class="back" onclick="window.location='menu.html'">
Kembali
</button>

</div>

</div>

</div>

<script>

let demo = localStorage.getItem("demo");

document.getElementById("judul").innerHTML = demo || "Demo";

function mulaiDemo(){

alert("Demo berhasil dijalankan.");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar</title>

<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="card">

<h2>DAFTAR</h2>

<form id="registerForm">

<input
type="text"
id="nama"
placeholder="Nama Lengkap"
required>

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Daftar

</button>

</form>

<p>

Sudah punya akun?

<a href="login.html">

Login

</a>

</p>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
